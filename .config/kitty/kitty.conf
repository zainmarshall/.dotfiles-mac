include ./theme.conf

# BEGIN_KITTY_FONTS
font_family JetBrainsMono Nerd Font
font_features JetBrainsMonoNF-Regular +liga +calt
font_features JetBrainsMonoNF-Bold +liga +calt
font_features JetBrainsMonoNF-Italic +liga +calt
font_features JetBrainsMonoNF-BoldItalic +liga +calt
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# background_opacity 0.76
 draw_minimal_borders yes
window_padding_width 2
window_border_width 0
# hide_window_decorations yes
# titlebar-only yes
active_border_color none
# BEGIN_KITTY_THEME
# Catppuccin-Mocha

font_size 20.0
cursor_shape block
shell_integration no-cursor

#Background
background_blur 30
background_opacity 0.85
dynamic_background_opacity no
# background_image /Users/zain/Downloads/a/a.jpg
background_tint 0.85
sync_to_monitor no

